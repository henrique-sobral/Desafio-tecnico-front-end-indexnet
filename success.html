<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro enviado</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./img/mao_petshop.svg" type="image/svg+xml">
</head>
<body>
    <main class="wizard success-container">
        <section class="success-card" aria-labelledby="success-title">
            <div class="success-card__icon" aria-hidden="true">
                <img src="./img/check_sucess.svg" alt="">
            </div>
            <h1 id="success-title">Dados enviados com sucesso!</h1>
            <p class="success-card__text">
                Recebemos as informacoes do seu estabelecimento e vamos analisar os dados para dar um retorno o mais breve possivel.
            </p>
            <a class="button button--primary success-card__button" href="./index.html">Voltar ao inicio</a>
        </section>
    </main>
</body>
</html>
